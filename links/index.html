<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links - The Sith Brotherhood</title>
  <link rel="icon" type="image/x-icon" href="../media/TSB.png">
  <link href="../style.css" rel="stylesheet" type="text/css" />

  <style>
    .links-container {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 0 20px;
      text-align: center;
    }

    /* Glass Panel at 0.5 transparency */
    .glass-panel {
      background: rgba(0, 0, 0, 0.5) !important;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 15px;
      padding: 50px 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    }

    /* Grid for Link Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 30px 20px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card:hover {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff3333;
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
    }

    .card h2 {
      color: #ff3333;
      margin: 0;
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    body.page-background {
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #000;
    }

    .title {
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      font-size: 3.5rem;
      margin-bottom: 20px;
    }
  </style>
</head>

<body class="page-background" style="background-image: url('../media/MainGroup_LOGO.png');">

  <div id="navbar-container"></div>

  <script src="../navbar.js"></script>
  <script>
    const ACTIVE = 'Links';
    const FinalPath = '../';
    document.getElementById('navbar-container').innerHTML = createNavbar(ACTIVE, FinalPath);
  </script>

  <main class="links-container">
    <h1 class="title">External Access</h1>

    <section class="glass-panel">
      <p style="color: #ccc; margin-bottom: 20px; font-size: 1.1rem;">Connect with the Brotherhood across all platforms.</p>
      
      <div class="grid">
        <a href="https://www.roblox.com/games/5579243956/The-Sith-Sanctuary-on-Yavin-IV" target="_blank" class="card">
          <h2>Roblox Game</h2>
        </a>

        <a href="https://www.roblox.com/groups/7440419/The-Sith-Brotherhood#!/about" target="_blank" class="card">
          <h2>Main Group</h2>
        </a>

        <a href="https://discord.gg/73bKC82aEs" target="_blank" class="card">
          <h2>Discord Server</h2>
        </a>
      </div>
    </section>

    <div style="margin-top: 3rem">
      <a href="../" style="color: #ff6b6b; font-size: 1.1rem; text-decoration: none; border: 1px solid #ff6b6b; padding: 10px 20px; border-radius: 5px; transition: 0.3s;">
        ← Return to Main Page
      </a>
    </div>
  </main>

  <script type="module" src="../script.js"></script>
</body>

</html>
