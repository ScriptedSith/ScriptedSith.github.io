<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Archives | Media</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .archive-header {
            text-align: center;
            border-bottom: 2px solid #ff0000;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        /* Filter System */
        .filter-container {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #ff0000;
            color: white;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        /* Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-card {
            background: #151515;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: block; /* For filtering logic */
        }

        .image-card:hover {
            transform: translateY(-5px);
            border-color: #ff0000;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .image-info { padding: 15px; }
        .image-title { color: #ff0000; margin: 0; text-transform: uppercase; }
        .tag-list { font-size: 0.7rem; color: #666; margin-top: 5px; text-transform: uppercase; }

        /* Modal */
        #imageModal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; flex-direction: column;
        }

        #modalImg { max-width: 90%; max-height: 80%; border: 1px solid #ff0000; }
        .close-modal { position: absolute; top: 20px; right: 35px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="archive-header">
        <h1>IMPERIAL MEDIA ARCHIVES</h1>
    </div>

    <div class="filter-container" id="filterBar">
        <button class="filter-btn active" onclick="filterGallery('All', this)">All</button>
    </div>

    <div class="media-grid" id="gallery"></div>

    <div id="imageModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg">
        <div id="modalCaption" style="color:white; margin-top:15px;"></div>
    </div>

    <script src="medias.js"></script>
    <script>
        const gallery = document.getElementById('gallery');
        const filterBar = document.getElementById('filterBar');

        function init() {
            renderGallery(mediaList);
            generateFilterButtons();
        }

        function renderGallery(list) {
            gallery.innerHTML = '';
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${item.Source}" alt="${item.title}">
                    <div class="image-info">
                        <h3 class="image-title">${item.title}</h3>
                        <p style="font-size:0.85rem; color:#aaa; margin:5px 0;">${item.Description}</p>
                        <div class="tag-list">${item.tags.join(' • ')}</div>
                    </div>
                `;
                card.onclick = () => openModal(item);
                gallery.appendChild(card);
            });
        }

        function generateFilterButtons() {
            const allTags = new Set();
            mediaList.forEach(item => item.tags.forEach(tag => allTags.add(tag)));
            
            allTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = tag;
                btn.onclick = () => filterGallery(tag, btn);
                filterBar.appendChild(btn);
            });
        }

        function filterGallery(tag, btn) {
            // UI Update
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Logic
            if (tag === 'All') {
                renderGallery(mediaList);
            } else {
                const filtered = mediaList.filter(item => item.tags.includes(tag));
                renderGallery(filtered);
            }
        }

        function openModal(item) {
            document.getElementById('imageModal').style.display = "flex";
            document.getElementById('modalImg').src = item.Source;
            document.getElementById('modalCaption').textContent = item.title;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        init();
    </script>
</body>
</html>
