<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranks - The Sith Brotherhood</title>
  <link rel="icon" type="image/x-icon" href="../../media/TSB.png">
  <link href="../../style.css" rel="stylesheet" type="text/css" />

  <style>
    .ranks-container {
      max-width: 900px;
      margin: 120px auto 60px;
      padding: 0 20px;
    }

    /* Glass Panel at 0.5 transparency */
    .glass-panel {
      background: rgba(0, 0, 0, 0.5) !important;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 15px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      color: white;
    }

    .subtitle {
      color: #ff3333;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 2px solid #ff3333;
      display: inline-block;
      margin-bottom: 25px;
      font-size: 1.8rem;
    }

    .rank-item {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .rank-item:last-child {
      border-bottom: none;
    }

    .rank {
      color: #ff6b6b;
      margin: 0;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rankdesc {
      margin: 5px 0 0 0;
      color: #ccc;
      line-height: 1.6;
    }

    .rankdesc a {
      color: #ff3333;
      text-decoration: none;
      font-weight: bold;
    }

    .rankdesc a:hover {
      text-decoration: underline;
    }

    body.page-background {
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #000;
    }

    .title {
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      font-size: 3.5rem;
    }
  </style>
</head>

<body class="page-background" style="background-image: url('../../media/MainGroup_LOGO.png');">

  <div id="navbar-container"></div>
  <script src="../../ranks-data.js"></script>
  <script src="../../navbar.js"></script>
  <script>
    const ACTIVE = 'Guides';
    const FinalPath = '../../';
    document.getElementById('navbar-container').innerHTML = createNavbar(ACTIVE, FinalPath);
  </script>

  <main class="ranks-container">
    <h1 class="title">Hierarchy of Power</h1>

    <div id="ranks-display"></div>

    <div style="margin-top: 3rem; text-align: center;">
      <a href="../"
        style="color: #ff6b6b; font-size: 1.1rem; text-decoration: none; border: 1px solid #ff6b6b; padding: 10px 20px; border-radius: 5px; transition: 0.3s;">
        ← Return to Guides
      </a>
    </div>
  </main>
  <script>
    const display = document.getElementById('ranks-display');

    // Use window.RANK_DATA instead of importing
    if (window.RANK_DATA) {
      window.RANK_DATA.forEach(section => {
        const glassPanel = document.createElement('section');
        glassPanel.className = 'glass-panel';

        let sectionHTML = `<h2 class="subtitle">${section.category}</h2>`;

        section.ranks.forEach(item => {
          sectionHTML += `
          <div class="rank-item">
            <h3 class="rank">${item.name}</h3>
            <p class="rankdesc">${item.desc}</p>
          </div>
        `;
        });

        glassPanel.innerHTML = sectionHTML;
        display.appendChild(glassPanel);
      });
    } else {
      display.innerHTML = "<p style='color:white;'>Archive connection failed...</p>";
    }
  </script>

  <script type="module" src="../../script.js"></script>
</body>

</html>
