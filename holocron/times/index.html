<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Section of Time - The Sith Brotherhood</title>
  <link rel="icon" type="image/x-icon" href="../../media/TSB.png">
  <link href="../../style.css" rel="stylesheet" type="text/css" />

  <style>
    .times-container {
      max-width: 1000px;
      margin: 120px auto 60px;
      padding: 0 20px;
    }

    /* Glass Panel at 0.5 transparency */
    .glass-panel {
      background: rgba(0, 0, 0, 0.5) !important;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 15px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card:hover {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff3333;
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
    }

    .card h2 {
      color: #ff3333;
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    .description {
      line-height: 1.8;
      color: #eee;
      font-size: 1.1rem;
      text-align: center;
    }

    body.page-background {
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #000;
    }

    .title {
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      font-size: 3.5rem;
    }
  </style>
</head>

<body class="page-background" style="background-image: url('../../media/MainGroup_LOGO.png');">

  <div id="navbar-container"></div>

  <script src="../../holocron-data.js"></script>
  <script src="../../navbar.js"></script>
  <script>
    const ACTIVE = 'Holocron';
    const FinalPath = '../../';
    document.getElementById('navbar-container').innerHTML = createNavbar(ACTIVE, FinalPath);
  </script>

  <main class="times-container">
    <h1 class="title">Section of Time</h1>

    <section class="glass-panel">
      <p class="description">
        Welcome to the Section of Time. Here you will explore the pivotal eras, ancient conflicts, and dark milestones
        throughout Sith history that have led to our current dominion.
      </p>
    </section>

    <script>
      const grid = document.getElementById('times-grid'); // Ensure your div has this ID

      window.HOLOCRON_DATA.times.forEach(planet => {
        const card = document.createElement('a');
        card.href = planet.path + "/";
        card.className = "card";
        card.innerHTML = `<h2>${planet.name}</h2>`;
        grid.appendChild(card);
      });
    </script>

    <div style="margin-top: 3rem; text-align: center;">
      <a href="../"
        style="color: #ff6b6b; font-size: 1.1rem; text-decoration: none; border: 1px solid #ff6b6b; padding: 10px 20px; border-radius: 5px; transition: 0.3s;">
        ← Return to Holocron
      </a>
    </div>
  </main>

  <script type="module" src="../../script.js"></script>
</body>

</html>
